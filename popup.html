<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>IP Whitelist Blocker</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="container">
    <div id="error-banner" style="display:none; background:#ffe0e0; color:#900; padding:6px 10px; font-size:12px; border-radius:4px;"></div>

    <h2>IP Whitelist Blocker</h2>

    <div class="status-box">
      <p>Current IP: <strong id="current-ip">Loading...</strong></p>
      <p>Status: <span id="status">...</span></p>
    </div>

    <div class="controls">
      <button id="toggle-enabled">Disable Blocker</button>
      <button id="add-current">Add Current IP to Whitelist</button>
    </div>

    <div class="whitelist-section">
      <h3>Whitelist</h3>
      <ul id="whitelist-list"></ul>

      <div class="add-manual">
        <input
          type="text"
          id="manual-ip"
          placeholder="Add IP manually"
          autocomplete="off"
          spellcheck="false"
        />
        <button id="add-manual-btn">Add</button>
      </div>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
